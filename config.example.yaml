# ─────────────────────────────────────────────────────────────
#  JUnit Agent — Configuration
#  Copy this to config.yaml and add your key. No code changes needed.
# ─────────────────────────────────────────────────────────────

provider:
  # Your API key. For Groq, get one at https://console.groq.com/keys
  api_key: "PUT_YOUR_GROQ_API_KEY_HERE"

  # OpenAI-compatible endpoint.
  #   Groq        : https://api.groq.com/openai/v1
  #   OpenAI      : https://api.openai.com/v1
  #   OpenRouter  : https://openrouter.ai/api/v1
  #   Ollama      : http://localhost:11434/v1
  base_url: "https://api.groq.com/openai/v1"

  # Model. On Groq's FREE tier prefer a lighter model:
  #   llama-3.3-70b-versatile   ← good default
  #   openai/gpt-oss-20b        ← lighter
  #   openai/gpt-oss-120b       ← heavy; may exceed free-tier limit
  model: "llama-3.3-70b-versatile"

  temperature: 0.3

  # Max tokens reserved for each response. Groq counts this against your
  # per-minute limit, so keep it modest on the free tier. 3072 fits a
  # typical test class; raise it on a paid tier.
  max_tokens: 3072

  # Automatic retries with backoff when the API rate-limits you.
  max_retries: 4

agent:
  # Step budget for the reasoning loop.
  #   "auto"  → computed automatically from the number of source files
  #             (you never need to touch this)
  #   <int>   → pin an explicit ceiling if you really want to
  max_steps: auto

  verbose: true

  # Context management — keeps each request small enough to stay under
  # token limits. You normally don't need to change these.
  keep_recent: 6
  max_old_tool_chars: 600

project:
  # Default project root. Usually you pass --project on the command line
  # instead of setting this.
  root: "."
  overwrite_existing: false
